<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Bootstrap and Vanilla JS Example</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- internal sytling  -->
  <style>
    .content-box {
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background-color: #f9f9f9;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="container text-center mt-5 container-fluid">
    <h1 class="mb-4">HTML + CSS + Vanilla JavaScript Example</h1>

    <!-- Bootstrap Button -->
    <button id="changeTextBtn" class="btn btn-primary">Click me to change text</button>

    <!-- Dynamic Content Box -->
    <div id="dynamicContent" class="content-box mt-4">
      This is the initial content. Click the button to see some magic!
    </div>
  </div>

  <!-- Vanilla JavaScript in Script Tag -->
  <script>
    // JavaScript code to change the content of the div when the button is clicked
    document.getElementById('changeTextBtn').addEventListener('click', function() {
      var contentDiv = document.getElementById('dynamicContent');
      contentDiv.innerHTML = 'This content has been changed dynamically using Vanilla JavaScript!';
      contentDiv.classList.add('bg-success', 'text-white');
    });
  </script>

</body>
</html>
