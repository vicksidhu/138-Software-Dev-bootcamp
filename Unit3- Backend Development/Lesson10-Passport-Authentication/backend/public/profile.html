<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Profile</title>
  </head>
  <body>
    <h1>Profile Page</h1>
    <p id="user-info"></p>
    <a href="/auth/logout">Logout</a>
    <a href="/secure.html">Secure Page</a>

    <script>
      fetch("/protected/profile")
        .then((res) => {
          if (res.ok) return res.json();
          else throw new Error("Not authenticated");
        })
        .then((data) => {
          document.getElementById(
            "user-info"
          ).textContent = `Hello, ${data.username}`;
        })
        .catch(() => {
          window.location.href = "/index.html";
        });
    </script>
  </body>
</html>
